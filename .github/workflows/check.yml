name: 予約監視

on:
  schedule:
    - cron: "0 * * * *"  # 毎時1回
  workflow_dispatch:

concurrency:
  group: reservation-check
  cancel-in-progress: false  # 実行中のジョブはキャンセルせず、次をキューに入れる

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Playwrightインストール
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 予約チェック実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESTAURANT_URLS: ${{ secrets.RESTAURANT_URLS }}
        run: |
          HOUR=$(TZ='Asia/Tokyo' date +%-H)

      
            LOOP=3
          
        

          for i in $(seq 1 $LOOP); do
            echo "===== チェック ${i}/${LOOP} 回目 ====="
            python check_reservations.py
          done
